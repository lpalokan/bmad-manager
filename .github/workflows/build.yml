name: build

on:
  # Mac (Swift app) CI. Path-gated so a Windows/Tauri-only change doesn't
  # trigger a macOS build — the release flow (release.yml) builds the DMG
  # independently on a published release, so gating here never affects
  # releases. A release-please version bump touches Resources/Info.plist, so
  # the Release PR still exercises this. The sibling Windows pipeline is
  # tauri-windows.yml.
  push:
    branches: [main, "integration/windows-and-codex"]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - "Resources/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - "Resources/**"
      - "scripts/**"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (debug, host arch)
        run: swift build

      - name: Test
        if: hashFiles('Tests/**/*.swift') != ''
        run: swift test

      - name: Build release DMG
        run: ./scripts/build_release.sh

      # Only keep a downloadable DMG for pushes to a tracked branch, not
      # for every PR run. PR builds still validate end-to-end via the
      # steps above; storing the binary for each PR is what filled the
      # account's Actions storage quota. Short retention caps accumulation.
      - name: Upload DMG artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bmad-manager-dmg
          path: dist/bmad-manager.dmg
          if-no-files-found: error
          retention-days: 5

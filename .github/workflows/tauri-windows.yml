name: tauri-windows

# Stage 3 of issue #25: builds the Tauri Windows port and packages it as
# a portable zip for Scoop distribution. Downloads portable Node +
# PortableGit at build time, pre-warms the bmad-method npm cache, then
# runs `pnpm tauri build --no-bundle` (compile only — no NSIS) and zips
# the compiled exe alongside the bundled resource dirs. Scoop consumes
# this zip, so the NSIS installer is skipped entirely: packing the whole
# ~490 MB payload into a solid-LZMA installer and then immediately
# unpacking it again just to produce the zip cost ~3 min of makensis per
# run for an artifact nobody installs. Tagging the commit with
# `windows-v*` (e.g. `windows-v0.1.0`) additionally creates a GitHub
# Release and attaches the zip.
#
# Sibling workflow `tauri-windows-check.yml` covers fmt/clippy/tests
# on every push; this one is the heavier release pipeline.

on:
  push:
    branches:
      - "main"
      - "integration/windows-and-codex"
    tags:
      - "windows-v*"
  workflow_dispatch:
  # Reusable entry point: `release.yml` calls this on a published
  # release-please release so the same EXE lands on the GitHub Release
  # alongside the macOS DMG. The caller passes the release tag as `ref`
  # and reads back the uploaded artifact's name to download + attach it.
  workflow_call:
    inputs:
      ref:
        description: "Git ref (tag/branch/sha) to build. Defaults to the triggering ref."
        required: false
        type: string
        default: ""
    outputs:
      portable-artifact-name:
        description: "Name of the uploaded portable zip artifact (used for Scoop)."
        value: ${{ jobs.build.outputs.portable-artifact-name }}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 40
    outputs:
      portable-artifact-name: ${{ steps.portable.outputs.filename }}
    defaults:
      run:
        working-directory: tauri

    env:
      # Pinned versions of the bundled tooling. Bumping is a deliberate
      # commit: edit these and verify the new installer size on the
      # workflow's Artifacts page.
      #   Node:        https://nodejs.org/dist/ (current LTS)
      #   PortableGit: https://github.com/git-for-windows/git/releases
      # PortableGit asset naming note: the tag is
      # `v<X.Y.Z>.windows.<N>` but the asset is just
      # `PortableGit-<X.Y.Z>-64-bit.7z.exe` (no `.<N>` suffix). Keep
      # the tag and the asset version as separate vars so a future
      # bump that DOES change the asset name (e.g. a `.2` revision)
      # can edit just the asset var.
      NODE_VERSION: "22.11.0"
      GIT_FOR_WINDOWS_TAG: "v2.47.0.windows.1"
      GIT_FOR_WINDOWS_ASSET_VERSION: "2.47.0"

    steps:
      - uses: actions/checkout@v4
        with:
          # `inputs.ref` is set only on workflow_call (release.yml passes
          # the release tag); for push/dispatch it is empty and we fall
          # back to the triggering ref.
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Reads the pinned pnpm version from the `packageManager`
          # field in tauri/package.json — single source of truth.
          package_json_file: tauri/package.json

      - name: Install Node.js (for the frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tauri/pnpm-lock.yaml

      - name: Download + extract portable Node
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://nodejs.org/dist/v$env:NODE_VERSION/node-v$env:NODE_VERSION-win-x64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "node-portable.zip"
          $stage = Join-Path $env:RUNNER_TEMP "node-portable-extract"
          $dest = "src-tauri/resources/node-portable"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $stage -Force
          # The official zip contains a single top-level
          # `node-v{VERSION}-win-x64/` folder. Move its contents up so
          # the runtime resolver finds `node.exe` / `npx.cmd` directly
          # under `resources/node-portable/`.
          $inner = Get-ChildItem $stage | Where-Object PSIsContainer | Select-Object -First 1
          Get-ChildItem -Path $inner.FullName | Move-Item -Destination $dest -Force
          $nodeExe = Join-Path $dest "node.exe"
          if (-not (Test-Path $nodeExe)) {
            throw "Node zip extracted but $nodeExe is missing"
          }
          Write-Host "Bundled Node:"
          & $nodeExe --version

      - name: Download + extract PortableGit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/git-for-windows/git/releases/download/$env:GIT_FOR_WINDOWS_TAG/PortableGit-$env:GIT_FOR_WINDOWS_ASSET_VERSION-64-bit.7z.exe"
          $exe = Join-Path $env:RUNNER_TEMP "portable-git-installer.exe"
          $raw = Join-Path $env:RUNNER_TEMP "portable-git-raw"
          $dest = "$pwd/src-tauri/resources/portable-git"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Write-Host ("Downloaded {0:N0} bytes" -f (Get-Item $exe).Length)
          # PortableGit ships as a 7z self-extracting installer. Use
          # Start-Process so the exit code is observable; piping `&` to
          # Out-Null swallows both stdout and any failure signal. `-y`
          # accepts the EULA, `-o<dir>` sets the extraction target.
          # Extract OUTSIDE the bundle tree: the archive contains
          # Cygwin-style symlinks (etc\mtab -> /proc/mounts) that recent
          # runner images materialise as stubs Windows cannot stat, and
          # tauri-build's resource walker aborts on the first such entry
          # ("os error 1920").
          $proc = Start-Process -FilePath $exe -ArgumentList "-y", "-o`"$raw`"" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            throw "PortableGit self-extractor exited with code $($proc.ExitCode)"
          }
          # Rebuild a clean tree for the bundle: /XJ /XJD /XJF skip
          # junctions and symlinks entirely, /XA:S drops MSYS symlink
          # cookie files (regular files flagged System, e.g. etc\mtab)
          # that Rust's canonicalize() rejects with os error 1920 inside
          # tauri-build's resource walk, and /R:0 /W:0 give up on
          # unreadable entries instead of retrying. Exit codes 0-7 are
          # robocopy success variants; 8+ means real failures.
          robocopy $raw $dest /E /XJ /XJD /XJF /XA:S /R:0 /W:0 /NP /NJH /NFL /NDL | Out-Host
          if ($LASTEXITCODE -ge 8) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }
          $global:LASTEXITCODE = 0
          $gitExe = Join-Path $dest "cmd\git.exe"
          if (-not (Test-Path $gitExe)) {
            throw "PortableGit extracted but $gitExe is missing"
          }
          Write-Host "Bundled Git:"
          & $gitExe --version
          # Keep the bundled etc\ attributes on record so a future stat
          # failure in the build can be diagnosed from this log.
          Get-ChildItem (Join-Path $dest 'etc') -Force | Select-Object Name, Attributes | Out-Host
          Write-Host ("Extracted file count: {0}" -f (Get-ChildItem $dest -Recurse -File).Count)

      - name: Pre-warm npm cache with bmad-method
        shell: pwsh
        run: |
          $cacheDir = "$pwd/src-tauri/resources/npm-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          $env:NPM_CONFIG_CACHE = $cacheDir
          # Use the bundled npm so it caches against the same registry +
          # version pin the app will run with at install time.
          & "$pwd/src-tauri/resources/node-portable/npm.cmd" cache add bmad-method
          Write-Host "npm cache contents (top level):"
          Get-ChildItem $cacheDir | Select-Object Name | Format-Table -AutoSize

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Resource directory inventory (pre-build sanity check)
        shell: pwsh
        run: |
          foreach ($d in @("node-portable", "portable-git", "npm-cache")) {
            $path = "src-tauri/resources/$d"
            if (Test-Path $path) {
              $count = (Get-ChildItem $path -Recurse -File).Count
              $bytes = (Get-ChildItem $path -Recurse -File | Measure-Object Length -Sum).Sum
              Write-Host ("{0,-18} {1,6} files, {2,12:N0} bytes" -f $d, $count, $bytes)
            } else {
              Write-Host "$d MISSING"
            }
          }

      # Compile only — no bundler. `--no-bundle` skips the NSIS step
      # (~3 min of solid-LZMA `makensis`) and still produces the release
      # exe at src-tauri/target/release/bmad-manager.exe plus the embedded
      # frontend. The portable zip below is assembled directly from that
      # exe and the staged resource dirs, so Scoop's only artifact never
      # pays for an installer no one installs.
      - name: Build Tauri app (compile only, no installer)
        run: pnpm tauri build --no-bundle

      - name: Build portable zip
        id: portable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Assemble the portable payload directly from the compiled exe +
          # the resource dirs staged before the build. This reproduces the
          # exact on-disk layout Tauri's BaseDirectory::Resource resolves
          # to next to the exe, mirroring the `bundle.resources` map in
          # tauri.conf.json (each resources/<name>/ -> <name>/). Scoop
          # extracts this zip as-is.
          $staging = Join-Path $env:RUNNER_TEMP "portable-staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          $exe = "src-tauri/target/release/bmad-manager.exe"
          if (-not (Test-Path $exe)) { throw "release build missing $exe" }
          Copy-Item $exe -Destination $staging -Force
          # Each bundled resource dir (node-portable, portable-git,
          # npm-cache) lands at the staging root under the same name. Copy
          # whatever dirs exist so adding a resource only needs the
          # tauri.conf.json map updated, not this step (the map keeps
          # source basename == target, e.g. resources/node-portable/ ->
          # node-portable/).
          $resDirs = Get-ChildItem "src-tauri/resources" -Directory
          if (-not $resDirs) { throw "no resource dirs under src-tauri/resources" }
          foreach ($d in $resDirs) {
            Copy-Item $d.FullName -Destination (Join-Path $staging $d.Name) -Recurse -Force
          }
          # Sanity-check the exact paths the runtime resolver
          # (platform/windows.rs) depends on, so a broken payload fails
          # here instead of on a user's machine.
          foreach ($p in @("bmad-manager.exe", "node-portable/node.exe", "portable-git/cmd/git.exe", "npm-cache")) {
            if (-not (Test-Path (Join-Path $staging $p))) { throw "portable payload missing $p" }
          }
          $filename = "bmad-manager-windows-x64-portable.zip"
          # upload-artifact resolves `path:` from the repo root and ignores
          # the job's working-directory, so hand it an absolute path.
          $zip = Join-Path (Resolve-Path "src-tauri/target/release").Path $filename
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zip
          $sizeMb = [Math]::Round((Get-Item $zip).Length / 1MB, 1)
          "path=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Portable zip: $filename ($sizeMb MB)"

      # Same rationale as the installer upload: short retention. On the
      # release path this is consumed immediately by attach-windows /
      # scoop-publish; on main pushes it's just a recent build to grab.
      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.portable.outputs.filename }}
          path: ${{ steps.portable.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.portable.outputs.path }}
          generate_release_notes: true

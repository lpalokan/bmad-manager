name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Build release DMG
        run: ./scripts/build_release.sh

      - name: Compute SHA256
        id: sha
        run: |
          echo "sha256=$(shasum -a 256 dist/bmad-manager.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Attach DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            dist/bmad-manager.dmg --clobber \
            --repo ${{ github.repository }}

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: lpalokan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i.bak -E "s/^  version \".*\"$/  version \"${VERSION}\"/" Casks/bmad-manager.rb
          sed -i.bak -E "s/^  sha256 .*$/  sha256 \"${SHA}\"/" Casks/bmad-manager.rb
          rm Casks/bmad-manager.rb.bak
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/bmad-manager.rb
          git commit -m "bmad-manager ${VERSION}"
          git push

      - name: Smoke test install
        run: |
          brew tap lpalokan/tap
          brew install --cask lpalokan/tap/bmad-manager
          test -d "/Applications/bmad-manager.app"

  # Build the Windows installer from the released tag, reusing the same
  # bundling pipeline as the standalone tauri-windows workflow so there
  # is a single source of truth for how the EXE is produced.
  windows-build:
    uses: ./.github/workflows/tauri-windows.yml
    secrets: inherit
    with:
      ref: ${{ github.event.release.tag_name || inputs.tag }}

  # Attach the freshly built EXE to the same GitHub Release the DMG goes
  # to, so release-please releases carry both platforms automatically.
  attach-windows:
    needs: windows-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows-build.outputs.artifact-name }}
          path: windows-installer

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows-build.outputs.portable-artifact-name }}
          path: windows-portable

      - name: Attach EXE + portable zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # `-print -quit` makes find emit the first match and exit on its
          # own, avoiding the SIGPIPE that `| head -n1` can raise under
          # `pipefail`.
          exe=$(find windows-installer -name '*.exe' -print -quit)
          zip=$(find windows-portable -name '*.zip' -print -quit)
          if [ -z "$exe" ]; then
            echo "no .exe found in downloaded artifact"
            exit 1
          fi
          if [ -z "$zip" ]; then
            echo "no .zip found in downloaded artifact"
            exit 1
          fi
          cp "$exe" "bmad-manager-windows-x64-setup.exe"
          cp "$zip" "bmad-manager-windows-x64-portable.zip"
          gh release upload "$TAG" \
            bmad-manager-windows-x64-setup.exe \
            bmad-manager-windows-x64-portable.zip --clobber \
            --repo ${{ github.repository }}

  # Update the Scoop manifest in the bucket repo, mirroring the Homebrew
  # cask update above. Guarded so the release still succeeds before the
  # SCOOP_BUCKET_TOKEN secret / bucket repo are configured.
  scoop-publish:
    needs: [windows-build, attach-windows]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Check for bucket token
        id: guard
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          if [ -z "${SCOOP_BUCKET_TOKEN:-}" ]; then
            echo "SCOOP_BUCKET_TOKEN not set — skipping Scoop manifest update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download portable artifact
        if: steps.guard.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows-build.outputs.portable-artifact-name }}
          path: windows-portable

      - name: Compute SHA256
        if: steps.guard.outputs.skip == 'false'
        id: sha
        run: |
          set -euo pipefail
          zip=$(find windows-portable -name '*.zip' -print -quit)
          echo "sha256=$(sha256sum "$zip" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout bucket repo
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: lpalokan/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/bmad-manager-windows-x64-portable.zip"
          manifest="scoop-bucket/bucket/bmad-manager.json"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" --arg u "$URL" --arg h "$SHA" \
            '.version = $v | .architecture."64bit".url = $u | .architecture."64bit".hash = $h' \
            "$manifest" > "$tmp"
          mv "$tmp" "$manifest"
          cd scoop-bucket
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/bmad-manager.json
          git commit -m "bmad-manager ${VERSION}"
          git push

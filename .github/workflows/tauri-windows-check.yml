name: tauri-windows-check

# CI for the Tauri Windows port (issue #25). Verifies the Rust crate
# compiles on Windows, passes fmt/clippy, runs unit + BDD tests, and that
# the frontend builds and passes its own BDD smoke. Stage 3 replaces this
# with a full `tauri build` + bundled Node/Git installer pipeline.

on:
  push:
    branches:
      - "main"
      - "integration/windows-and-codex"
    paths:
      - "tauri/**"
      - ".github/workflows/tauri-windows-check.yml"
  pull_request:
    paths:
      - "tauri/**"
      - ".github/workflows/tauri-windows-check.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: tauri

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('tauri/src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Reads the pinned pnpm version from the `packageManager`
          # field in tauri/package.json — keeps CI + corepack + local
          # dev on the same version with one source of truth.
          package_json_file: tauri/package.json

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tauri/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Frontend type check
        run: pnpm check

      - name: Frontend BDD smoke
        run: pnpm test:bdd

      - name: Cargo fmt
        working-directory: tauri/src-tauri
        run: cargo fmt --all -- --check

      # release-please bumps tauri/src-tauri/Cargo.toml's version via its
      # extra-files generic updater, but nothing rewrites the matching
      # `bmad-manager` entry in Cargo.lock (release-please has no
      # cargo-canonical lock updater for a `simple` release-type, and a
      # textual edit would not survive cargo's next lockfile rewrite). So
      # on every release PR the checked-in lock lags one version behind
      # the manifest, and the `--locked` steps below abort with
      # "cannot update the lock file ... because --locked was passed".
      # Reconcile only the workspace member versions — offline, so every
      # third-party pin is left byte-for-byte untouched and the `--locked`
      # steps still enforce full dependency determinism for the build.
      - name: Sync Cargo.lock workspace version
        working-directory: tauri/src-tauri
        run: cargo update --workspace --offline

      - name: Cargo clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Cargo check (Rust crate)
        working-directory: tauri/src-tauri
        run: cargo check --locked --all-targets

      - name: Rust unit tests
        working-directory: tauri/src-tauri
        run: cargo test --locked --lib

      - name: Rust BDD
        working-directory: tauri/src-tauri
        run: cargo test --locked --test bdd
